<div class="container-fluid p-4">
  <div class="mb-4">
    <h2 class="fw-bold">System Overview</h2>
    <p class="text-secondary">Welcome back, Administrator. Here is the latest inventory status.</p>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-12 col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="d-flex align-items-center">
          <div class="bg-info bg-opacity-10 p-3 rounded-circle text-info me-3">
            <i class="bi bi-person-badge fs-4"></i>
          </div>
          <div>
            <p class="text-secondary mb-0 small">Total Employees</p>
            <h4 class="fw-bold mb-0">24</h4>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="d-flex align-items-center">
          <div class="bg-success bg-opacity-10 p-3 rounded-circle text-success me-3">
            <i class="bi bi-box-seam fs-4"></i>
          </div>
          <div>
            <p class="text-secondary mb-0 small">Total Products</p>
            <h4 class="fw-bold mb-0">100</h4>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="d-flex align-items-center">
          <div class="bg-warning bg-opacity-10 p-3 rounded-circle text-warning me-3">
            <i class="bi bi-tags fs-4"></i>
          </div>
          <div>
            <p class="text-secondary mb-0 small">Categories</p>
            <h4 class="fw-bold mb-0">12</h4>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-3">
      <div class="card border-0 shadow-sm p-3 bg-danger bg-opacity-10">
        <div class="d-flex align-items-center">
          <div class="bg-white p-3 rounded-circle text-danger me-3">
            <i class="bi bi-exclamation-triangle fs-4"></i>
          </div>
          <div>
            <p class="text-dark mb-0 small">Low Stock Items</p>
            <h4 class="fw-bold mb-0 text-danger">5</h4>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-12 col-lg-8">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <h5 class="card-title mb-4">Inventory Movement</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Laptop Pro 15</td>
                  <td>Electronics</td>
                  <td><span class="badge bg-success-subtle text-success">In Stock</span></td>
                  <td><button class="btn btn-sm btn-outline-secondary">View</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <h5 class="card-title mb-3">Quick Actions</h5>
          <div class="d-grid gap-2">
            <button class="btn btn-primary" routerLink="/products/create">Add New Product</button>
            <button class="btn btn-outline-primary">Generate Report</button>
            <button class="btn btn-outline-primary">Manage Categories</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
