<div class="d-flex justify-content-between align-items-center">
    <div class="fw-bold fs-1">List of Categories</div>
    <div>
        <button  class="btn btn-outline-primary" routerLink="create">
            <i class="bi bi-plus-circle"></i>Add New
        </button>
    </div>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let category of categories$|async;let i=index">
            <th scope="row">{{i+1}}</th>
            <td>{{category.name}}</td>
            <td>
                <button type="button" class="btn btn-sm btn-secondary me-1" title="Edit" routerLink="edit/{{category.id}}"><i class="bi bi-pencil-square"></i></button>
                <button type="button" class="btn btn-sm btn-info me-1" title="Details"><i class="bi bi-eye"></i></button>
                <button type="button" class="btn btn-sm btn-danger" title="Delete"><i class="bi bi-trash"></i></button>
            </td>
        </tr>
    </tbody>
</table>
