<div class="d-flex justify-content-between align-items-center">
    <div class="fw-bold fs-1">List of Categories</div>
    <div>
        <button  class="btn btn-outline-primary" routerLink="create">
            <i class="bi bi-plus-circle"></i>Add New
        </button>
    </div>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let category of categories();let i=index">
            <th scope="row">{{i+1}}</th>
            <td>{{category.name}}</td>
            <td>
                <button type="button" class="btn btn-sm btn-secondary me-1" title="Edit" routerLink="edit/{{category.id}}"><i class="bi bi-pencil-square"></i></button>

                <button type="button" class="btn btn-sm btn-info me-1" 
                title="Details" data-bs-toggle="modal" data-bs-target="#category-details-modal"
                (click)="onDetailsClick(category)"><i class="bi bi-eye"></i></button>
                <button type="button" class="btn btn-sm btn-danger" title="Delete"
                (click)=onDeleteClick(category)><i class="bi bi-trash"></i></button>
            </td>
        </tr>
    </tbody>
</table>
<!-- Details Modal -->
<div class="modal fade" id="category-details-modal" tabindex="-1"  aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" >Category Details</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" *ngIf="selectedCat.name!=null">
        <div class="row">
            <div class="col-2">Name:</div>
            <div class="col-10">{{selectedCat.name}}</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
