<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold m-0">Category List</h2>
    <a routerLink="create" class="btn btn-primary shadow-sm">
      <i class="bi bi-plus-circle me-1"></i> Add New
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-4">#</th>
              <th>Category Name</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let category of categories(); let i = index">
              <td class="ps-4 text-muted">{{i + 1}}</td>
              <td class="fw-semibold">{{category.name}}</td>
              <td class="text-center">
                <div class="btn-group btn-group-sm" role="group">
                  <button class="btn btn-outline-secondary" title="Edit" routerLink="edit/{{category.id}}">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                  <button class="btn btn-outline-info" title="Details" 
                          data-bs-toggle="modal" data-bs-target="#category-details-modal" 
                          (click)="onDetailsClick(category)">
                    <i class="bi bi-eye"></i>
                  </button>
                  <button class="btn btn-outline-danger" title="Delete" (click)="onDeleteClick(category)">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="category-details-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-light">
        <h5 class="modal-title">Category Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row align-items-center" *ngIf="selectedCat.name">
          <div class="col-4 fw-bold text-muted">Category Name:</div>
          <div class="col-8 fs-5">{{selectedCat.name}}</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
