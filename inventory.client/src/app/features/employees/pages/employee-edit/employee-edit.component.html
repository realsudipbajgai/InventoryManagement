<div class="container mt-4">
  <h2 class="mb-4">Update Employee</h2>

  <form *ngIf="employee$ | async" [formGroup]="editForm" (submit)="onSubmit()" class="row g-3">
    
    <div class="col-md-6">
      <div class="form-floating">
        <input type="text" class="form-control" id="name" formControlName="name" placeholder="Name">
        <label for="name">Full Name</label>
      </div>
    </div>

    <div class="col-md-6">
      <div class="form-floating">
        <input type="email" class="form-control" id="email" formControlName="email" placeholder="Email">
        <label for="email">Email Address</label>
      </div>
    </div>

    <div class="col-md-4">
      <div class="form-floating">
        <input type="text" class="form-control" id="phone" formControlName="phone" placeholder="Phone">
        <label for="phone">Phone Number</label>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-floating">
        <input type="number" class="form-control" id="age" formControlName="age" placeholder="Age">
        <label for="age">Age</label>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-floating">
        <input type="text" class="form-control" id="role" formControlName="role" placeholder="Role">
        <label for="role">Role/Position</label>
      </div>
    </div>

    <div class="col-12">
      <div class="form-floating">
        <input type="text" class="form-control" id="address" formControlName="address" placeholder="Address">
        <label for="address">Address</label>
      </div>
    </div>

    <div class="col-12 mt-4">
      <h5 class="mb-3">Profile Photo</h5>
      <div class="d-flex align-items-center gap-4">
        <div *ngIf="editForm.get('photoPath')?.value" class="border p-2 rounded">
          <img [src]="serverUrl + '/' + editForm.get('photoPath')?.value" 
               alt="employee Photo" class="img-thumbnail" style="width: 150px; height: 150px; object-fit: cover;">
        </div>
        
        <div class="flex-grow-1">
          <label class="form-label">Upload New Photo</label>
          <input type="file" class="form-control" (change)="onPhotoSelected($event)">
        </div>
      </div>
    </div>

    <div class="col-12 mt-4">
      <button type="submit" class="btn btn-primary px-4 me-2">
        <i class="bi bi-save me-1"></i> Update Employee
      </button>
      <button type="button" class="btn btn-outline-secondary" routerLink="/employees">
        Cancel
      </button>
    </div>
  </form>
</div>
