<div class="container mt-4">
  <h2 class="mb-4">Add New Employee</h2>

  <form (ngSubmit)="onSubmit()" class="row g-3">
    
    <div class="col-md-6">
      <div class="form-floating">
        <input type="text" class="form-control" id="name" name="name" 
               [(ngModel)]="user.name" placeholder="Name">
        <label for="name">Full Name</label>
      </div>
    </div>

    <div class="col-md-6">
      <div class="form-floating">
        <input type="email" class="form-control" id="email" name="email" 
               [(ngModel)]="user.email" placeholder="Email">
        <label for="email">Email Address</label>
      </div>
    </div>

    <div class="col-md-4">
      <div class="form-floating">
        <input type="text" class="form-control" id="phone" name="phone" 
               [(ngModel)]="user.phone" placeholder="Phone">
        <label for="phone">Phone Number</label>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-floating">
        <input type="number" class="form-control" id="age" name="age" 
               [(ngModel)]="user.age" placeholder="Age">
        <label for="age">Age</label>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-floating">
        <input type="text" class="form-control" id="role" name="role" 
               [(ngModel)]="user.role" placeholder="Role">
        <label for="role">Role/Position</label>
      </div>
    </div>

    <div class="col-12">
      <div class="form-floating">
        <input type="text" class="form-control" id="address" name="address" 
               [(ngModel)]="user.address" placeholder="Address">
        <label for="address">Address</label>
      </div>
    </div>

    <div class="col-12">
      <label class="form-label text-muted ms-1">Profile Photo</label>
      <input type="file" class="form-control" id="photo" name="photo" 
             (change)="onFileSelected($event)">
    </div>

    <div class="col-12 mt-4">
      <button type="submit" class="btn btn-primary px-4 me-2">
        <i class="bi bi-person-plus me-1"></i> Add Employee
      </button>
      <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
