<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold m-0">Products</h2>
    <a routerLink="create" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i> Add New Product
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-4">#</th>
              <th>Name</th>
              <th>Serial Number</th>
              <th>Category</th>
              <th>Purchase Date</th>
              <th>Status</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let product of products$ | async; let i = index">
              <td class="ps-4 fw-bold text-muted">{{i + 1}}</td>
              <td>{{product.name}}</td>
              <td><code>{{product.serialNumber}}</code></td>
              <td><span class="badge bg-secondary">{{product.category?.name}}</span></td>
              <td>{{product.purchaseDate | date:'mediumDate'}}</td>
              <td>
                <span class="badge bg-success-subtle text-success">{{product.status}}</span>
              </td>
              <td class="text-center">
                <div class="btn-group" role="group">
                  <button class="btn btn-sm btn-outline-info" title="Edit" routerLink="edit/{{product.id}}">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-secondary" title="Details" routerLink="details/{{product.id}}">
                    <i class="bi bi-eye"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger" title="Delete" routerLink="delete/{{product.id}}">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
