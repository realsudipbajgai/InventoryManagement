<div class="d-flex justify-content-between align-items-center">
    <div class="fw-bold fs-1">
        List of products
    </div>
    <div>
        <button type="button" class="btn  btn-outline-primary" [routerLink]="['create']"> <i class="bi bi-plus-circle"></i>Add New</button>
    </div>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>S.N.</th>
            <th>Name</th>
            <th>SerialNumber</th>
            <th>Category</th>
            <th>Purchase Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let product of products$|async; let i=index">
            <td>{{i+1}}</td>
            <td>{{product.name}}</td>
            <td>{{product.serialNumber}}</td>
            <td>{{product.category.name}}</td>
            <td>{{product.purchaseDate}}</td>
            <td>{{product.status}}</td>
            <td>
                <button type="button" class="btn btn-sm text-info me-2" 
                title="Edit" routerLink="edit/{{product.id}}" >
                    <i class="bi bi-pencil"></i>
                </button>
                <button type="button" class="btn btn-sm text-secondary me-2" title="Details" routerLink="details/{{product.id}}"><i class="bi bi-eye-fill"></i> </button>
                <button type="button" class="btn btn-sm text-danger" 
                title="Delete" routerLink="delete/{{product.id}}"> 
                <i class="bi bi-trash"></i></button>
            </td>
        </tr>
    </tbody>
</table>
